name: valhalla

# Production stack for Valhalla CRM (Twenty fork) — builds your modified code
# locally (no Docker Hub image). server + worker share one built image.
services:
  server:
    build:
      context: .
      dockerfile: packages/twenty-docker/twenty/Dockerfile
      target: twenty # server + frontend in one image
    image: valhalla-crm:latest
    volumes:
      - server-local-data:/app/packages/twenty-server/.local-storage
    ports:
      - "3000:3000"
    environment:
      NODE_PORT: 3000
      PG_DATABASE_URL: postgres://${PG_DATABASE_USER:-postgres}:${PG_DATABASE_PASSWORD:?set PG_DATABASE_PASSWORD in .env}@db:5432/default
      SERVER_URL: ${SERVER_URL:?set SERVER_URL in .env}
      REDIS_URL: redis://redis:6379
      STORAGE_TYPE: local
      APP_SECRET: ${APP_SECRET:?set APP_SECRET in .env}
      IS_BILLING_ENABLED: "false"
      # Email (optional — needed for invites / password reset). Uncomment + fill:
      # EMAIL_DRIVER: smtp
      # EMAIL_FROM_ADDRESS: contacto@tudominio.com
      # EMAIL_FROM_NAME: Valhalla
      # EMAIL_SMTP_HOST: smtp.tuproveedor.com
      # EMAIL_SMTP_PORT: 587
      # EMAIL_SMTP_USER: ${EMAIL_SMTP_USER:-}
      # EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: curl --fail http://localhost:3000/healthz
      interval: 5s
      timeout: 5s
      retries: 20
    restart: always

  worker:
    build:
      context: .
      dockerfile: packages/twenty-docker/twenty/Dockerfile
      target: twenty
    image: valhalla-crm:latest
    volumes:
      - server-local-data:/app/packages/twenty-server/.local-storage
    command: ["yarn", "worker:prod"]
    environment:
      PG_DATABASE_URL: postgres://${PG_DATABASE_USER:-postgres}:${PG_DATABASE_PASSWORD:?}@db:5432/default
      SERVER_URL: ${SERVER_URL:?}
      REDIS_URL: redis://redis:6379
      STORAGE_TYPE: local
      APP_SECRET: ${APP_SECRET:?}
      IS_BILLING_ENABLED: "false"
      DISABLE_DB_MIGRATIONS: "true" # the server runs them
      DISABLE_CRON_JOBS_REGISTRATION: "true" # the server registers them
    depends_on:
      db:
        condition: service_healthy
      server:
        condition: service_healthy
    restart: always

  db:
    image: postgres:16
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: default
      POSTGRES_USER: ${PG_DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_DATABASE_PASSWORD:?}
    healthcheck:
      test: pg_isready -U ${PG_DATABASE_USER:-postgres} -h localhost -d postgres
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  redis:
    image: redis:7
    command: ["redis-server", "--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

volumes:
  db-data:
  server-local-data:
